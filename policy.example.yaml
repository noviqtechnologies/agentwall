version: "2" # Enforce Schema v2 in v6.1 (Guidance #6)
default_action: deny

session:
  max_calls_per_second: 10

tools:
  - name: "exec_shell"
    action: allow
    parameters:
      - name: "command"
        type: string
        required: true
        # TODO: add pattern constraint for this parameter
        # pattern: ".*"  # Example: restrict to safe values

  - name: "list_directory"
    action: allow
    parameters:
      - name: "directory"
        type: string
        required: true
        # TODO: add pattern constraint for this parameter
        # pattern: ".*"  # Example: restrict to safe values

  - name: "read_file"
    action: allow
    parameters:
      - name: "path"
        type: string
        required: true
        # TODO: add pattern constraint for this parameter
        # pattern: ".*"  # Example: restrict to safe values

  - name: "write_file"
    action: allow
    parameters:
      - name: "content"
        type: string
        required: true
        # TODO: add pattern constraint for this parameter
        # pattern: ".*"  # Example: restrict to safe values
      - name: "path"
        type: string
        required: true
        # TODO: add pattern constraint for this parameter
        # pattern: ".*"  # Example: restrict to safe values

  # Demonstration of a complex parameter type with a required JSON schema (Guidance #6)
  - name: "configure_settings"
    action: allow
    parameters:
      - name: "options"
        type: object
        required: true
        schema:
          type: object
          properties:
            theme:
              type: string
              enum: ["dark", "light"]
            retries:
              type: integer
              minimum: 0
          required: ["theme"]

# FR-306: Agent Firewall Cycle Detection and Loop Prevention
firewall:
  enabled: true
  cycle_detection:
    max_attempts: 3
    action: pivot_error  # Options: pivot_error, block, pause_interactive
