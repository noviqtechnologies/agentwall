name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: agentwall-linux
            asset_name: agentwall-v1.0.4-linux.zip
          - os: macos-latest
            artifact_name: agentwall-macos
            asset_name: agentwall-v1.0.4-macos.zip
          - os: windows-latest
            artifact_name: agentwall-windows
            asset_name: agentwall-v1.0.4-windows.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        run: cargo build --release

      - name: Prepare Release Directory
        shell: bash
        run: |
          mkdir -p release/bin release/ui release/config
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/agentwall.exe release/bin/
          else
            cp target/release/agentwall release/bin/
          fi
          cp demo-ui/index.html release/ui/
          cp demo-ui/bridge.py release/ui/
          cp demo-ui/policy.yaml release/config/policy.yaml.example

      - name: Create Zip (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd release
          zip -r ../${{ matrix.asset_name }} .

      - name: Create Zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path release\* -DestinationPath ${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
