name: Release AgentWall

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: agentwall-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            name: agentwall-macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            name: agentwall-macos-silicon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: agentwall-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir ${{ matrix.name }}
          cp target/${{ matrix.target }}/release/agentwall ${{ matrix.name }}/agentwall
          cp README.md ${{ matrix.name }}/
          cp -r manual_test ${{ matrix.name }}/
          zip -r ${{ matrix.name }}.zip ${{ matrix.name }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir ${{ matrix.name }}
          cp target/${{ matrix.target }}/release/agentwall.exe ${{ matrix.name }}/agentwall.exe
          cp README.md ${{ matrix.name }}/
          cp -r manual_test ${{ matrix.name }}/
          Compress-Archive -Path ${{ matrix.name }}/* -DestinationPath ${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
