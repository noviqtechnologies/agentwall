name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            arch_name: linux-x86_64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            arch_name: linux-aarch64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            arch_name: macos-x86_64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            arch_name: macos-aarch64
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch_name: windows-x86_64
            use_cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep -m 1 "^version = " Cargo.toml | cut -d '"' -f 2)
          echo "VERSION=v$VERSION" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary (Cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build binary (Cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare Release Directory
        shell: bash
        run: |
          mkdir -p release/bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/agentwall.exe release/bin/
          else
            cp target/${{ matrix.target }}/release/agentwall release/bin/
          fi

      - name: Create Zip (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd release
          zip -r ../agentwall-${{ env.VERSION }}-${{ matrix.arch_name }}.zip .

      - name: Create Zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path release\* -DestinationPath agentwall-${{ env.VERSION }}-${{ matrix.arch_name }}.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentwall-${{ matrix.arch_name }}
          path: agentwall-${{ env.VERSION }}-${{ matrix.arch_name }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep -m 1 "^version = " Cargo.toml | cut -d '"' -f 2)
          echo "VERSION=v$VERSION" >> $GITHUB_ENV

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
