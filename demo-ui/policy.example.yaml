version: "2"
default_action: deny

# FR-202: Identity Binding configuration
# To enable identity binding, provide an HTTPS issuer and audience.
# identity:
#   issuer: "https://auth.company.com"
#   audience: "agentwall-proxy"

session:
  max_calls_per_second: 10

tools:
  # FR-201: Nested Validation Engine Example
  - name: "query_database"
    action: allow
    risk: high
    parameters:
      - name: "options"
        type: object
        schema:
          type: object
          properties:
            query: { type: string, pattern: "^SELECT.*" }
            limit: { type: integer, maximum: 100 }
            filters:
              type: object
              properties:
                status: { type: string, enum: ["active", "pending"] }
              required: ["status"]
          required: ["query", "limit"]

  - name: "read_file"
    action: allow
    risk: low
    parameters:
      - name: "path"
        type: string
        pattern: "^/workspace/.*"
        required: true

  - name: "write_file"
    action: allow
    risk: medium
    parameters:
      - name: "path"
        type: string
        pattern: "^/workspace/output/.*"
        required: true
      - name: "content"
        type: string
        required: true