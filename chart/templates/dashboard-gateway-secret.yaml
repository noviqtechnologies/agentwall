{{- if .Values.dashboardApi.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentwall.fullname" . }}-dashboard-gateway-secret
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agentwall.labels" . | nindent 4 }}
type: Opaque
{{- $existingSecret := (lookup "v1" "Secret" .Values.namespace.name (printf "%s-dashboard-gateway-secret" (include "agentwall.fullname" .))) }}
{{- $token := "" }}
{{- if and $existingSecret $existingSecret.data (index ($existingSecret.data) "GATEWAY_SECRET") }}
{{- $token = index $existingSecret.data "GATEWAY_SECRET" }}
{{- else }}
{{- $token = randAlphaNum 32 | b64enc }}
{{- end }}
data:
  GATEWAY_SECRET: {{ $token }}
{{- end }}
