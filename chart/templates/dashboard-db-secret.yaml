{{- if .Values.dashboardDb.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentwall.fullname" . }}-dashboard-db
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agentwall.labels" . | nindent 4 }}
type: Opaque
{{- $existingSecret := (lookup "v1" "Secret" .Values.namespace.name (printf "%s-dashboard-db" (include "agentwall.fullname" .))) }}
{{- $pgPassword := "" }}
{{- if and $existingSecret $existingSecret.data (index $existingSecret.data "POSTGRES_PASSWORD") }}
{{- $pgPassword = index $existingSecret.data "POSTGRES_PASSWORD" | b64dec }}
{{- else }}
{{- $pgPassword = randAlphaNum 24 }}
{{- end }}
{{- $dbHost := printf "%s-dashboard-db" (include "agentwall.fullname" .) }}
{{- $dbName := "agentwall_dashboard" }}
{{- $dbURL := printf "postgres://dashboard:%s@%s:%d/%s?sslmode=disable" $pgPassword $dbHost (.Values.dashboardDb.port | int) $dbName }}
data:
  POSTGRES_PASSWORD: {{ $pgPassword | b64enc }}
  DATABASE_URL: {{ $dbURL | b64enc }}
{{- end }}
