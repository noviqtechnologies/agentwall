{{- if .Values.dashboardDb.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentwall.fullname" . }}-dashboard-db
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agentwall.labels" . | nindent 4 }}
    {{- include "agentwall.dashboardDbSelectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: postgres
    port: {{ .Values.dashboardDb.port }}
    targetPort: postgres
    protocol: TCP
  selector:
    {{- include "agentwall.dashboardDbSelectorLabels" . | nindent 4 }}
{{- end }}
