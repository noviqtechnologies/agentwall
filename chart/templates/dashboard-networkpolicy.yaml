{{- if and .Values.dashboardApi.enabled .Values.policy.networkPolicyEnforced -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "agentwall.fullname" . }}-dashboard-egress
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agentwall.labels" . | nindent 4 }}
spec:
  # Allow gateway pods to reach dashboard-api on its service port.
  # Without this rule, a cluster-wide default-deny or future gateway
  # egress restriction would silently drop the fire-and-forget POSTs
  # from DashboardClient — the client logs a warning but never crashes,
  # so the dashboard would stop receiving events with no obvious signal.
  podSelector:
    matchLabels:
      agentwall.io/gateway: "true"
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          {{- include "agentwall.dashboardApiSelectorLabels" . | nindent 10 }}
    ports:
    - port: {{ .Values.dashboardApi.port }}
      protocol: TCP
{{- end }}
