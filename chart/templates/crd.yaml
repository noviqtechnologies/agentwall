{{- if .Values.crds.install -}}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentwallpolicies.agentwall.io
  labels:
    {{- include "agentwall.labels" . | nindent 4 }}
  annotations:
    # Keep the CRD if the chart is uninstalled, so existing CRs don't die.
    # Users who really want it gone should `kubectl delete crd` explicitly.
    "helm.sh/resource-policy": keep
spec:
  group: agentwall.io
  names:
    kind: AgentWallPolicy
    listKind: AgentWallPolicyList
    plural: agentwallpolicies
    singular: agentwallpolicy
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AgentWallPolicy is the Schema for the agentwallpolicies API
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: AgentWallPolicySpec defines the desired state of AgentWallPolicy
            properties:
              gatewayImage:
                type: string
              policy:
                type: string
              identity:
                properties:
                  provider:
                    type: string
                  vaultAddr:
                    type: string
                type: object
              networkPolicy:
                description: |
                  FR-5 §5.5.8: Egress NetworkPolicy generation. When enforced is
                  true, the operator creates a NetworkPolicy that restricts agent
                  pod egress to the gateway pod on mcpPort only (plus DNS).
                properties:
                  enforced:
                    type: boolean
                  agentPodSelector:
                    additionalProperties:
                      type: string
                    description: |
                      Labels selecting agent pods that will be restricted.
                      Defaults to {agentwall.io/agent: "true"} if empty.
                    type: object
                  gatewayPodSelector:
                    additionalProperties:
                      type: string
                    description: |
                      Labels selecting the gateway pod that agents are allowed
                      to reach. Defaults to {agentwall.io/gateway: "true"} if empty.
                    type: object
                  mcpPort:
                    description: TCP port the gateway listens on. Defaults to 8080.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                type: object
            type: object
          status:
            description: AgentWallPolicyStatus defines the observed state of AgentWallPolicy
            properties:
              gatewayPodName:
                type: string
              lastReconcileTime:
                type: string
              phase:
                type: string
              networkPolicyName:
                description: Name of the generated NetworkPolicy, if any.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
