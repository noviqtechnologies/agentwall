{{- if .Values.dashboardApi.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentwall.fullname" . }}-dashboard-api
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agentwall.labels" . | nindent 4 }}
    {{- include "agentwall.dashboardApiSelectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboardApi.replicas }}
  selector:
    matchLabels:
      {{- include "agentwall.dashboardApiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agentwall.dashboardApiSelectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.dashboardApi.securityContext | nindent 8 }}
      containers:
      - name: dashboard-api
        image: {{ include "agentwall.dashboardApiImage" . }}
        imagePullPolicy: {{ .Values.dashboardApi.image.pullPolicy }}
        env:
        - name: DASHBOARD_PORT
          value: {{ .Values.dashboardApi.port | quote }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "agentwall.fullname" . }}-dashboard-db
              key: DATABASE_URL
        - name: GATEWAY_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "agentwall.fullname" . }}-dashboard-gateway-secret
              key: GATEWAY_SECRET
        - name: OIDC_ISSUER
          value: {{ .Values.dashboardApi.oidc.issuer | quote }}
        - name: OIDC_CLIENT_ID
          value: {{ .Values.dashboardApi.oidc.clientId | quote }}
        - name: POLICY_READ_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "agentwall.fullname" . }}-dashboard-policy-read-secret
              key: POLICY_READ_SECRET
        - name: GATEWAY_URL
          value: "http://{{ include "agentwall.fullname" . }}-gateway:{{ .Values.gateway.service.port }}"
        ports:
        - name: http
          containerPort: {{ .Values.dashboardApi.port }}
          protocol: TCP
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        securityContext:
          {{- toYaml .Values.dashboardApi.containerSecurityContext | nindent 10 }}
        resources:
          {{- toYaml .Values.dashboardApi.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 16Mi
      terminationGracePeriodSeconds: 30
      {{- with .Values.dashboardApi.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboardApi.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboardApi.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
