{{- if and .Values.gateway.enabled .Values.gateway.tls.enabled .Values.gateway.tls.createSelfSigned (not .Values.gateway.tls.secretName) -}}
{{- /*
     Generate a self-signed cert valid for the gateway's Service DNS name.
     Helm's genSelfSignedCert produces a 2048-bit RSA cert valid for 365 days.
     This is DEV ONLY — no rotation, no proper CA. Users should provide
     their own Secret via .Values.gateway.tls.secretName in production.

     We use lookup to preserve the cert across upgrades — regenerating it
     on every `helm upgrade` would break existing TLS sessions.
*/ -}}
{{- $secretName := include "agentwall.tlsSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Values.namespace.name $secretName -}}
{{- if $existing }}
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agentwall.labels" . | nindent 4 }}
data:
  tls.crt: {{ index $existing.data "tls.crt" }}
  tls.key: {{ index $existing.data "tls.key" }}
{{- else }}
{{- $svcName := printf "%s-gateway" (include "agentwall.fullname" .) -}}
{{- $altNames := list $svcName (printf "%s.%s.svc" $svcName .Values.namespace.name) (printf "%s.%s.svc.cluster.local" $svcName .Values.namespace.name) -}}
{{- $cert := genSelfSignedCert $svcName nil $altNames 365 -}}
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agentwall.labels" . | nindent 4 }}
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
{{- end }}
