{{- if .Values.dashboardApi.enabled -}}
{{- $secretName := printf "%s-dashboard-policy-read-secret" (include "agentwall.fullname" .) -}}
{{- $existingSecret := (lookup "v1" "Secret" .Values.namespace.name $secretName) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agentwall.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existingSecret $existingSecret.data (index ($existingSecret.data) "POLICY_READ_SECRET") }}
  POLICY_READ_SECRET: {{ index $existingSecret.data "POLICY_READ_SECRET" }}
  {{- else }}
  POLICY_READ_SECRET: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
