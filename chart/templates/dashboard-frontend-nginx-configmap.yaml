{{- if .Values.dashboardFrontend.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agentwall.fullname" . }}-dashboard-frontend-nginx
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "agentwall.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback — all routes serve index.html, React Router handles them.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to dashboard-api.
        location /api/ {
            proxy_pass http://{{ include "agentwall.fullname" . }}-dashboard-api:{{ .Values.dashboardApi.port }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE support for /api/v1/alerts/stream.
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        # Security headers.
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'" always;

        # Cache static assets aggressively (Vite hashes filenames).
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
{{- end }}
