apiVersion: v2
name: agentwall
description: |
  VEXA AgentWall — centralized enterprise security gateway enforcing
  deterministic policies for AI agent tool calls over the Model Context
  Protocol (MCP).

  This chart deploys three components:
    1. The AgentWall Kubernetes operator (reconciles AgentWallPolicy CRs)
    2. The AgentWall gateway (the enforcement proxy binary)
    3. A sample AgentWallPolicy CR (optional, disabled by default)

type: application
version: 0.1.0
appVersion: "1.0.13"
kubeVersion: ">=1.24.0-0"
home: https://github.com/noviqtechnologies/agentwall
sources:
  - https://github.com/noviqtechnologies/agentwall
keywords:
  - security
  - mcp
  - agent
  - proxy
  - gateway
  - dlp
maintainers:
